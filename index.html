<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ELGOKER Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Splash -->
<div id="splash">
  <h1>Elgoker Store 🎁</h1>
</div>

<header>
  <h1>ELGOKER Store 🎁</h1>

  <div id="cartCounter">
    🛒 Cart: <span id="cartCount">0</span>
  </div>
</header>

<div id="products"></div>

<!-- Cart -->
<div id="cart">
  <h2>السلة</h2>
  <div id="cartItems"></div>
  <h3>الإجمالي: <span id="total">0</span> جنيه</h3>

  <button onclick="openForm()">احجز الآن</button>
</div>

<!-- Form -->
<div id="formBox" class="hidden">
  <div class="form">
    <h2>بيانات العميل</h2>

    <input id="name" placeholder="الاسم ثلاثي">
    <input id="phone" placeholder="رقم الهاتف">
    <input id="address" placeholder="المحافظة / العنوان">

    <button onclick="sendWhatsApp()">حجز واتساب</button>
    <button onclick="closeForm()">إغلاق</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
